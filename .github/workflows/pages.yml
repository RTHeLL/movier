name: GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'extension/**'
      - 'filters/**'
      - 'scripts/**'
      - 'releases/extension/**'
      - '.github/workflows/pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Pack extension for site downloads
        run: npm run pack:extension

      - working-directory: web
        run: npm ci

      - working-directory: web
        env:
          VITE_BASE: /
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
          VITE_KP_API_KEY: ${{ secrets.VITE_KP_API_KEY }}
        run: npm run build

      - name: Prepare docs/
        run: |
          rm -rf docs
          mkdir -p docs/filters docs/extension
          cp -a web/dist/. docs/
          cp -a filters/. docs/filters/
          cp -a web/public/extension/. docs/extension/
          # зеркало unpacked с GitHub releases (если pack уже положил в releases/)
          if [ -d releases/extension/unpacked ]; then
            mkdir -p docs/extension/unpacked
            cp -a releases/extension/unpacked/. docs/extension/unpacked/
          fi
          touch docs/.nojekyll
          test -f docs/privacy.html
          test -f docs/extension/movier-extension.zip
          test -f docs/extension/version.json

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
