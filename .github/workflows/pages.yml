name: GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - working-directory: web
        run: npm ci

      - working-directory: web
        env:
          VITE_BASE: /
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
          VITE_KP_API_KEY: ${{ secrets.VITE_KP_API_KEY }}
        run: npm run build

      - name: Prepare docs/
        run: |
          rm -rf docs
          mkdir -p docs/filters
          cp -a web/dist/. docs/
          cp -a filters/. docs/filters/
          touch docs/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
