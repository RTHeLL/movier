services:
  api:
    build:
      context: ../server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      FILTERS_DIR: /app/filters
      TRUST_PROXY: "1"
    volumes:
      - ../filters:/app/filters:ro
    expose:
      - "8787"
    networks:
      - movier
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8787/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  caddy:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.caddy
      args:
        VITE_API_BASE: ""
        VITE_BASE: /
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - movier

volumes:
  caddy_data:
  caddy_config:

networks:
  movier:
    driver: bridge
